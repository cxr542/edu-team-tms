name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy_production:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Deploy production to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Smoke check root page
        run: curl -fsS "https://okestro-edu-team-tms.vercel.app/" > /dev/null

      - name: Smoke check ledger snapshot API
        run: curl -fsS "https://okestro-edu-team-tms.vercel.app/api/ledger-snapshot" > /dev/null

      - name: Publish deployment summary
        run: |
          echo "## Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: https://okestro-edu-team-tms.vercel.app/" >> "$GITHUB_STEP_SUMMARY"
          echo "- Alias: https://edu-team-tms.vercel.app/ (동일 콘텐츠)" >> "$GITHUB_STEP_SUMMARY"
