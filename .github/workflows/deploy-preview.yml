name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deploy_preview:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Deploy preview to Vercel
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          npx vercel build --token="$VERCEL_TOKEN"
          DEPLOY_OUTPUT="$(npx vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "$DEPLOY_OUTPUT"
          PREVIEW_URL="$(echo "$DEPLOY_OUTPUT" | grep -Eo 'https://[^ ]+\.vercel\.app' | head -n 1)"
          if [ -z "$PREVIEW_URL" ]; then
            echo "Failed to parse preview URL from Vercel output."
            exit 1
          fi
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Add preview URL to summary
        run: |
          echo "## Preview Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR: #${{ github.event.pull_request.number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.vercel_deploy.outputs.preview_url }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.vercel_deploy.outputs.preview_url }}";
            const body = `Preview deployment is ready.\n\n- URL: ${url}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
