<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Learning Platform - Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --secondary-hover: #db2777;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            text-align: center;
            z-index: 1;
        }

        header {
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .cards-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInUp 0.8s ease-out both;
        }

        .card:nth-child(2) { animation-delay: 0.2s; }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            transition: transform 0.3s;
            transform: scaleX(0);
        }

        .card.trainee::before { background: var(--primary); }
        .card.admin::before { background: var(--secondary); }

        .card:hover::before { transform: scaleX(1); }

        .icon-box {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 2.5rem;
            transition: transform 0.3s;
        }

        .card:hover .icon-box {
            transform: scale(1.1) rotate(5deg);
        }

        .trainee .icon-box { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .admin .icon-box { background: rgba(236, 72, 153, 0.1); color: var(--secondary); }

        h2 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .card-desc {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
            flex-grow: 1;
        }

        .btn {
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            text-align: center;
            width: 100%;
        }

        .btn-trainee { background: var(--primary); color: white; }
        .btn-trainee:hover { background: var(--primary-hover); }

        .btn-admin { background: var(--secondary); color: white; }
        .btn-admin:hover { background: var(--secondary-hover); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            margin-top: auto;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Cloud Chatbot Platform</h1>
            <p class="subtitle">클라우드 학습의 새로운 패러다임, 지능형 챗봇 도우미와 함께 시작하세요.</p>
        </header>

        <div class="cards-wrapper">
            <div class="card trainee" onclick="location.href='/'">
                <div class="icon-box">📖</div>
                <h2>교육생 모드</h2>
                <p class="card-desc">
                    지능형 RAG 챗봇과 대화하며 클라우드 용어를 학습하고,<br>
                    요약 서비스와 퀴즈를 통해 실력을 점검하세요.
                </p>
                <a href="/" class="btn btn-trainee">학습 시작하기</a>
            </div>

            <div class="card admin" onclick="location.href='/admin/'">
                <div class="icon-box">⚙️</div>
                <h2>관리자 모드</h2>
                <p class="card-desc">
                    학습 문서를 업로드하고 챗봇의 성격을 설정하세요.<br>
                    교육생들의 대화 로그를 실시간으로 모니터링합니다.
                </p>
                <a href="/admin/" class="btn btn-admin">시스템 관리하기</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 Cloud Learning Chatbot Project. Built with Antigravity.
    </footer>
</body>
</html>
